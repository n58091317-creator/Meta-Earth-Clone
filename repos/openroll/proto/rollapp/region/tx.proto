syntax = "proto3";

package stchain.rollapp.region;

import "cosmos/base/v1beta1/coin.proto";
import "gogoproto/gogo.proto";
import "rollapp/region/region.proto";
import "rollapp/region/relayer.proto";

option go_package = "github.com/st-chain/rollapp/x/region/types";

// Msg defines the Msg service.
service Msg {
  rpc UpdateRegion                  (MsgUpdateRegion                 ) returns (MsgUpdateRegionResponse                 );
  rpc RemoveRegion                  (MsgRemoveRegion                 ) returns (MsgRemoveRegionResponse                 );
  rpc CreateRelayer                 (MsgCreateRelayer                ) returns (MsgCreateRelayerResponse                );
  rpc UpdateRelayer                 (MsgUpdateRelayer                ) returns (MsgUpdateRelayerResponse                );
  rpc DeleteRelayer                 (MsgDeleteRelayer                ) returns (MsgDeleteRelayerResponse                );
}
message MsgUpdateRegion {
           string creator      = 1;
           uint64 proof_height = 2;
           bytes  store_hash   = 3;
           bytes  store_proof  = 4;
           bytes  proofs       = 5;
  repeated Item   regions      = 6;
}

message MsgUpdateRegionResponse {}

message Item {
  bytes key   = 1;
  bytes value = 2;
}

message MsgRemoveRegion {
           string creator      = 1;
           uint64 proof_height = 2;
           bytes  store_hash   = 3;
           bytes  store_proof  = 4;
           bytes  proofs       = 5;
  repeated Item   regions      = 6;
}

message MsgRemoveRegionResponse {}




message Height {
  
  // the revision that the client is currently on
  uint64 revision_number = 1 [(gogoproto.moretags) = "yaml:\"revision_number\""];
  
  // the height within the given revision
  uint64 revision_height = 2 [(gogoproto.moretags) = "yaml:\"revision_height\""];
}


message MsgCreateRelayer {
  string creator = 1;
  string address = 2;
}

message MsgCreateRelayerResponse {}

message MsgUpdateRelayer {
  string creator = 1;
  string address = 2;
}

message MsgUpdateRelayerResponse {}

message MsgDeleteRelayer {
  string creator = 1;
  string address = 2;
}

message MsgDeleteRelayerResponse {}

