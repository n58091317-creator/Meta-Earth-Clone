syntax = "proto3";
package stchain.rollapp.region;

import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/st-chain/rollapp/x/region/types";

message Region {
  string region_id = 1;
  string operator_address = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string region_treasure_addr = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

message MeHubRegionType {
  string regionId = 1;
  string name = 2;
  string creator = 3;
  string operator_address = 4 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string nft_class_id = 5;
  string region_treasure_addr = 6 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string deposit_interest_addr = 8 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // tokens define the region tokens share
  string region_share = 9 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Int",
    (gogoproto.nullable) = false
  ];
  string delegate_interest = 10 [
    (cosmos_proto.scalar) = "cosmos.Dec",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Dec",
    (gogoproto.nullable) = false
  ];
  string delegate_amount = 11 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Int",
    (gogoproto.nullable) = false
  ];
  string fixed_deposit_amount = 12 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Int",
    (gogoproto.nullable) = false
  ];
}
