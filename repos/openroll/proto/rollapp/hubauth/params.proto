syntax = "proto3";
package stchain.rollapp.hubauth;

import "gogoproto/gogo.proto";

option go_package = "github.com/st-chain/rollapp/x/hubauth/types";

// Params defines the parameters for the module.
message Params {
  option (gogoproto.goproto_stringer) = false;
  
  string clientId = 1 [(gogoproto.moretags) = "yaml:\"client_id\""];
  string denom_path = 2 [(gogoproto.moretags) = "yaml:\"denom_path\""];
}
