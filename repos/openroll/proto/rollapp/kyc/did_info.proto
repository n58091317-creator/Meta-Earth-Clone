syntax = "proto3";
package stchain.rollapp.kyc;
import "gogoproto/gogo.proto";
import "cosmos_proto/cosmos.proto";
option go_package = "github.com/st-chain/rollapp/x/kyc/types";

message DidInfo {
  string did     = 1;
  string address = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  
  // public_key is mapped to the user address
  // the issuer will use public_key to encrypt the user's certificate to ensure the privacy of the off-chain certificate
  string    pubkey   = 3;
  DidStatus status   = 4;
  string    regionId = 5;
  KycLevel  kycLevel = 6;
}

// kyc level enum
enum KycLevel {
  option (gogoproto.goproto_enum_stringer) =  true;
  option   (gogoproto.goproto_enum_prefix) = false;
  KYC_LEVEL_NONE = 0 [(gogoproto.enumvalue_customname) = "KYC_LEVEL_NONE "];
  KYC_LEVEL_ONE  = 1 [(gogoproto.enumvalue_customname) = "KYC_LEVEL_ONE " ];
  KYC_LEVEL_TWO  = 2 [(gogoproto.enumvalue_customname) = "KYC_LEVEL_TWO"  ];
}
// did status enum
enum DidStatus {
  option (gogoproto.goproto_enum_stringer) =  true;
  option   (gogoproto.goproto_enum_prefix) = false;
  DID_STATUS_DEACTIVE = 0 [(gogoproto.enumvalue_customname) = "DID_STATUS_DEACTIVE "];
  DID_STATUS_ACTIVE   = 1 [(gogoproto.enumvalue_customname) = "DID_STATUS_ACTIVE"   ];
}