services:
  me-docs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_ENV: production
        PNPM_VERSION: 10.33.0
    image: me-docs:latest
    container_name: me-docs
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - APP_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
